<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>D.A.P TV On-Demand</title>
  <style>
    body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow-x: hidden; }
    #brand { text-align: center; color: #FFD700; font-size: clamp(18px, 4vw, 24px); font-weight: bold; padding: 10px; }
    
    /* Netflix Style Billboard / Hero Preview Area */
    #hero-container {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #0a0a0a;
      overflow: hidden;
      border-bottom: 3px solid #FFD700;
    }

    #hero-iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
      pointer-events: none;
    }

    .hero-vignette {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(0deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.6) 100%);
      z-index: 2;
      pointer-events: none;
    }

    #hero-content {
      position: absolute;
      bottom: 25px;
      left: 25px;
      z-index: 3;
      max-width: 600px;
    }

    #hero-title {
      color: #FFD700;
      font-size: clamp(20px, 4vw, 36px);
      font-weight: bold;
      margin: 0 0 10px 0;
      text-shadow: 2px 2px 6px #000;
    }

    #hero-desc {
      color: #ddd;
      font-size: clamp(12px, 2vw, 15px);
      margin: 0 0 15px 0;
      text-shadow: 1px 1px 4px #000;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .hero-btn-group {
      display: flex;
      gap: 10px;
    }

    .netflix-btn-play {
      background: #FFD700;
      color: #000;
      border: none;
      padding: 10px 22px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      font-size: clamp(12px, 2vw, 15px);
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    .netflix-btn-play:hover { background: #fff; }

    .netflix-btn-info {
      background: rgba(109, 109, 110, 0.7);
      color: #fff;
      border: none;
      padding: 10px 22px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      font-size: clamp(12px, 2vw, 15px);
      backdrop-filter: blur(4px);
    }
    .netflix-btn-info:hover { background: rgba(109, 109, 110, 0.9); }

    /* Netflix Style Horizontal Row / Grid Section */
    #vod-catalog-section {
      padding: 20px 15px;
      background: #000;
    }

    .section-heading {
      color: #FFD700;
      font-size: clamp(16px, 3vw, 20px);
      font-weight: bold;
      margin-bottom: 12px;
    }

    .poster-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px;
    }

    .poster-card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.25s ease, border-color 0.25s ease;
      display: flex;
      flex-direction: column;
    }

    .poster-card:hover {
      transform: scale(1.05);
      border-color: #FFD700;
      z-index: 10;
    }

    .poster-img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 2/3;
      background: #111;
    }

    .poster-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .poster-title-bar {
      padding: 8px;
      font-size: 12px;
      font-weight: bold;
      color: #fff;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      background: #141414;
    }

    /* Fullscreen Modal View for Playing Full Movie */
    #full-player-modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #000;
      z-index: 999999;
      display: none;
      flex-direction: column;
    }

    #full-player-header {
      background: #111;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #FFD700;
    }

    #full-player-title {
      color: #FFD700;
      font-weight: bold;
      font-size: 16px;
    }

    .close-modal-btn {
      background: #FFD700;
      color: #000;
      border: none;
      padding: 6px 14px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
    }

    #full-player-body {
      position: relative;
      flex-grow: 1;
      width: 100%;
      background: #000;
    }

    #full-player-iframe {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<div id="brand">D.A.P TV ON-DEMAND</div>

<!-- Netflix Style Hero Billboard Preview Player -->
<div id="hero-container">
  <div class="hero-vignette"></div>
  <iframe id="hero-iframe" frameborder="0" allow="autoplay; encrypted-media"></iframe>
  <div id="hero-content">
    <h1 id="hero-title">Select a Movie</h1>
    <p id="hero-desc">Click any movie poster below to preview a teaser clip right here, or click Play to watch the full feature.</p>
    <div class="hero-btn-group">
      <button class="netflix-btn-play" onclick="launchFullFeature()">▶ Play Movie</button>
      <button class="netflix-btn-info" onclick="toggleHeroInfo()">ⓘ Overview</button>
    </div>
  </div>
</div>

<!-- On-Demand Poster Catalog Row -->
<div id="vod-catalog-section">
  <div class="section-heading">D.A.P On-Demand Library</div>
  <div class="poster-row" id="poster-grid">
    <!-- Populated dynamically via JS -->
  </div>
</div>

<!-- Fullscreen Feature Player Modal -->
<div id="full-player-modal">
  <div id="full-player-header">
    <span id="full-player-title">Now Playing</span>
    <button class="close-modal-btn" onclick="closeFullFeature()">CLOSE ✕</button>
  </div>
  <div id="full-player-body">
    <iframe id="full-player-iframe" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
  </div>
</div>

<script>
  // Core VOD Library Data linked with active streaming links
  const vodLibrary = [
    { 
      name: "Strive", 
      id: "k4ObpDYw3BipbbHWEW2", 
      poster: "1000024001.jpg", 
      desc: "Because everyone deserves a chance. An inspiring feature starring Danny Glover.",
      clipStart: 120, clipEnd: 155, active: true 
    },
    { 
      name: "Ink", 
      id: "k1OjGBaUwtLuvrHWG9U", 
      poster: "1000023997.jpg", 
      desc: "A Jamin Winans film exploring dreamwalkers, soul recovery, and emotional shadows.",
      clipStart: 30, clipEnd: 65, active: true 
    },
    { 
      name: "THE REDWOOD MASSACRE", 
      id: "k2btb1TuZW82y7HWJ4u", 
      poster: "1000024000.jpg", 
      desc: "Based on a horrifying true story, a weekend getaway turns into a bloodbath.",
      clipStart: 10, clipEnd: 45, active: true 
    },
    { 
      name: "Nasty Old People", 
      id: "k2onvpqu5aRLmUHWMR4", 
      poster: "1000023998.jpg", 
      desc: "Dark comedy and unpredictable senior chaos unfold in the home care system.",
      clipStart: 85, clipEnd: 120, active: true 
    },
    { 
      name: "Half Empty", 
      id: "k3oEnpPscWIfF8HWOdw", 
      poster: "1000023963.jpg", 
      desc: "A gripping drama directed by Troy Carlton exploring intense personal stakes.",
      clipStart: 40, clipEnd: 75, active: true 
    },
    { 
      name: "Artifacts Of Idealism", 
      id: "k7iwKjmDYVxYRSHWR4q", 
      poster: "1000023999.jpg", 
      desc: "Directed by Sean Corbett, a thought-provoking exploration of truth and philosophy.",
      clipStart: 15, clipEnd: 50, active: true 
    },
    { 
      name: "Tiger", 
      id: "k5q4oSCRSb8wg7HWT2S", 
      poster: "1000023920.jpg", 
      desc: "Beaufort presents Tiger, starring Rachel Blais and James McFay.",
      clipStart: 60, clipEnd: 95, active: true 
    },
    { 
      name: "Pioneer One: Episode 1", 
      id: "k3yLmn40bkRQJtHYsZE", 
      poster: "1000023996.jpg", 
      desc: "Sci-fi drama series exploring a mysterious object landing on Earth. Episode 1.",
      clipStart: 10, clipEnd: 45, active: true 
    },
    { 
      name: "Pioneer One: Episode 2", 
      id: "k2bedAe74dcpEQHYtX8", 
      poster: "1000023996.jpg", 
      desc: "Sci-fi drama series continuing the investigation of the mysterious object. Episode 2.",
      clipStart: 10, clipEnd: 45, active: true 
    }
  ];

  let currentSelectedMovie = vodLibrary[0];

  function renderCatalog() {
    const grid = document.getElementById('poster-grid');
    grid.innerHTML = "";

    vodLibrary.forEach((movie) => {
      let card = document.createElement('div');
      card.className = 'poster-card';
      card.onclick = () => selectMovieForPreview(movie);

      card.innerHTML = `
        <div class="poster-img-wrap">
          <img src="${movie.poster}" alt="${movie.name}" loading="lazy">
        </div>
        <div class="poster-title-bar">${movie.name}</div>
      `;
      grid.appendChild(card);
    });
  }

  function selectMovieForPreview(movie) {
    currentSelectedMovie = movie;
    document.getElementById('hero-title').innerText = movie.name;
    document.getElementById('hero-desc').innerText = movie.desc;

    const heroIframe = document.getElementById('hero-iframe');
    if (movie.active && movie.id) {
      heroIframe.src = `https://www.dailymotion.com/embed/video/${movie.id}?autoplay=1&mute=1&controls=0&start=${movie.clipStart}&end=${movie.clipEnd}&loop=1&queue-enable=0&sharing-enable=0&related-video=0`;
      heroIframe.style.display = "block";
    } else {
      heroIframe.src = "";
      heroIframe.style.display = "none";
    }
  }

  function launchFullFeature() {
    if (!currentSelectedMovie.active || !currentSelectedMovie.id) {
      alert("This title is coming soon!");
      return;
    }
    const modal = document.getElementById('full-player-modal');
    const modalTitle = document.getElementById('full-player-title');
    const modalIframe = document.getElementById('full-player-iframe');

    modalTitle.innerText = "Now Playing: " + currentSelectedMovie.name;
    modalIframe.src = `https://www.dailymotion.com/embed/video/${currentSelectedMovie.id}?autoplay=1&mute=0&controls=1&queue-enable=0&sharing-enable=0&related-video=0`;
    
    modal.style.display = 'flex';
  }

  function closeFullFeature() {
    const modal = document.getElementById('full-player-modal');
    const modalIframe = document.getElementById('full-player-iframe');
    
    modalIframe.src = "";
    modal.style.display = 'none';
  }

  function toggleHeroInfo() {
    alert(currentSelectedMovie.name + "\n\n" + currentSelectedMovie.desc);
  }

  renderCatalog();
  selectMovieForPreview(vodLibrary[0]);
</script>
</body>
</html>
