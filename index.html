<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>D.A.P TV On-Demand</title>
  <style>
    body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow-x: hidden; }
    #brand { text-align: center; color: #FFD700; font-size: clamp(18px, 4vw, 24px); font-weight: bold; padding: 10px; }
    
    /* Netflix Style Billboard / Hero Preview Area */
    #hero-container {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #0a0a0a;
      overflow: hidden;
      border-bottom: 3px solid #FFD700;
    }

    #hero-iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
      pointer-events: none;
    }

    .hero-vignette {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(0deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.6) 100%);
      z-index: 2;
      pointer-events: none;
    }

    #hero-content {
      position: absolute;
      bottom: 25px;
      left: 25px;
      z-index: 3;
      max-width: 600px;
    }

    #hero-title {
      color: #FFD700;
      font-size: clamp(20px, 4vw, 36px);
      font-weight: bold;
      margin: 0 0 10px 0;
      text-shadow: 2px 2px 6px #000;
    }

    #hero-desc {
      color: #ddd;
      font-size: clamp(12px, 2vw, 15px);
      margin: 0 0 15px 0;
      text-shadow: 1px 1px 4px #000;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .hero-btn-group {
      display: flex;
      gap: 10px;
    }

    .netflix-btn-play {
      background: #FFD700;
      color: #000;
      border: none;
      padding: 10px 22px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      font-size: clamp(12px, 2vw, 15px);
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    .netflix-btn-play:hover { background: #fff; }

    .netflix-btn-info {
      background: rgba(109, 109, 110, 0.7);
      color: #fff;
      border: none;
      padding: 10px 22px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      font-size: clamp(12px, 2vw, 15px);
      backdrop-filter: blur(4px);
    }
    .netflix-btn-info:hover { background: rgba(109, 109, 110, 0.9); }

    /* Netflix Style Horizontal Row / Grid Section */
    #vod-catalog-section {
      padding: 20px 15px;
      background: #000;
    }

    .section-heading {
      color: #FFD700;
      font-size: clamp(16px, 3vw, 20px);
      font-weight: bold;
      margin-bottom: 12px;
    }

    .poster-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px;
    }

    .poster-card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.25s ease, border-color 0.25s ease;
      display: flex;
      flex-direction: column;
    }

    .poster-card:hover {
      transform: scale(1.05);
      border-color: #FFD700;
      z-index: 10;
    }

    .poster-img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 2/3;
      background: #111;
    }

    .poster-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .poster-title-bar {
      padding: 8px;
      font-size: 12px;
      font-weight: bold;
      color: #fff;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      background: #141414;
    }

    /* Fullscreen Modal View for Playing Full Movie */
    #full-player-modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #000;
      z-index: 999999;
      display: none;
      flex-direction: column;
    }

    #full-player-header {
      background: #111;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #FFD700;
    }

    #full-player-title {
      color: #FFD700;
      font-weight: bold;
      font-size: 16px;
    }

    .close-modal-btn {
      background: #FFD700;
      color: #000;
      border: none;
      padding: 6px 14px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
    }

    #full-player-body {
      position: relative;
      flex-grow: 1;
      width: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    #full-player-iframe {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      border: none;
    }

    /* Episode Selector Overlay for Series */
    #episode-selector {
      position: relative;
      z-index: 10;
      background: rgba(20, 20, 20, 0.95);
      border: 2px solid #FFD700;
      padding: 30px;
      border-radius: 8px;
      text-align: center;
      max-width: 400px;
      width: 90%;
      display: none;
    }

    #episode-selector h3 {
      color: #FFD700;
      margin-top: 0;
    }

    .ep-btn {
      display: block;
      width: 100%;
      background: #333;
      color: #fff;
      border: 1px solid #555;
      padding: 12px;
      margin: 10px 0;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
    }
    .ep-btn:hover {
      background: #FFD700;
      color: #000;
      border-color: #FFD700;
    }
  </style>
</head>
<body>

<div id="brand">D.A.P TV ON-DEMAND</div>

<!-- Netflix Style Hero Billboard Preview Player -->
<div id="hero-container">
  <div class="hero-vignette"></div>
  <iframe id="hero-iframe" frameborder="0" allow="autoplay; encrypted-media"></iframe>
  <div id="hero-content">
    <h1 id="hero-title">Select a Movie</h1>
    <p id="hero-desc">Click any movie poster below to preview a teaser clip right here, or click Play to watch the full feature.</p>
    <div class="hero-btn-group">
      <button class="netflix-btn-play" onclick="launchFullFeature()">▶ Play Movie</button>
      <button class="netflix-btn-info" onclick="toggleHeroInfo()">ⓘ Overview</button>
    </div>
  </div>
</div>

<!-- On-Demand Poster Catalog Row -->
<div id="vod-catalog-section">
  <div class="section-heading">D.A.P On-Demand Library</div>
  <div class="poster-row" id="poster-grid">
    <!-- Populated dynamically via JS -->
  </div>
</div>

<!-- Fullscreen Feature Player Modal -->
<div id="full-player-modal">
  <div id="full-player-header">
    <span id="full-player-title">Now Playing</span>
    <button class="close-modal-btn" onclick="closeFullFeature()">CLOSE ✕</button>
  </div>
  <div id="full-player-body">
    <!-- Episode Selector Box (Used for Pioneer One series) -->
    <div id="episode-selector">
      <h3>Select Episode</h3>
      <div id="episode-list"></div>
    </div>
    <iframe id="full-player-iframe" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen style="display:none;"></iframe>
  </div>
</div>

    { name: "Half Empty", id: "k3oEnpPscWIfF8HWOdw", poster: "Half Empty.jpg", desc: "A gripping drama directed by Troy Carlton exploring intense personal stakes.", clipStart: 40, clipEnd: 75, active: true },
    { name: "Artifacts Of Idealism", id: "k7iwKjmDYVxYRSHWR4q", poster: "ARTIFACTS OF IDEALISM.jpg", desc: "Directed by Sean Corbett, a thought-provoking exploration of truth and philosophy.", clipStart: 15, clipEnd: 50, active: true },

    },

    // Complete Poster Library Catalog
    { name: "56", id: "", poster: "56.jpg", desc: "Award-winning documentary short featured at the 51st United Nations Human Rights Council.", clipStart: 0, clipEnd: 30, active: false },

    { name: "Alike", id: "", poster: "Alike.jpg", desc: "Directed by Daniel Martínez Lara & Rafa Cano Méndez. A touching animated short.", clipStart: 0, clipEnd: 30, active: false },
    { name: "Angels", id: "", poster: "ANGELS.jpg", desc: "A film by Jane Labous. A powerful new documentary exploring a silent crisis.", clipStart: 0, clipEnd: 30, active: false },
    { name: "Are You There?", id: "", poster: "ARE YOU THERE.jpg", desc: "Written and directed by Austin Brink. Produced by AJ Films.", clipStart: 0, clipEnd: 30, active: false },
    { name: "Bad Dad", id: "", poster: "BAD DAD.jpg", desc: "Written & directed by Cameron Macgowan, starring Tyler Rive and Mandy Stobo.", clipStart: 0, clipEnd: 30, active: false },
    { name: "Between the Lines", id: "", poster: "Between the Lines.jpg", desc: "A fly fishing documentary film exploring wild waters.", clipStart: 0, clipEnd: 30, active: false },

    { name: "Senpai", id: "", poster: "SENPAI.jpg", desc: "Anime-style club adventures and high school antics.", clipStart: 0, clipEnd: 30, active: false },
    { name: "Singularity", id: "", poster: "SINGULARITY.jpg", desc: "Sci-fi visual art and conceptual masterpiece exploring cybernetic evolution.", clipStart: 0, clipEnd: 30, active: false },
    { name: "Sintel", id: "", poster: "SINTEL.jpg", desc: "An epic open movie fantasy adventure about a young girl and her dragon companion.", clipStart: 0, clipEnd: 30, active: false },
    { name: "Sita Sings The Blues", id: "", poster: "Sita Sings The Blues.jpg", desc: "The greatest break-up story ever told. A film by Nina Paley.", clipStart: 0, clipEnd: 30, active: false },
    { name: "Sol Lavante", id: "", poster: "SOL LAVANTE.jpg", desc: "An immersive hand-drawn animated short film experience.", clipStart: 0, clipEnd: 30, active: false },
    { name: "Space Transformers", id: "", poster: "SPACE TRANSFORMERS.jpg", desc: "Mecha combat and interstellar warfare across futuristic retro gridlines.", clipStart: 0, clipEnd: 30, active: false },
    { name: "SpellBound", id: "", poster: "SpellBound.jpg", desc: "An animated journey of wonder, mail delivery, and magical neighborhood thresholds.", clipStart: 0, clipEnd: 30, active: false },
    { name: "Spoetnik", id: "", poster: "SPOETNIK.jpg", desc: "Halal Pictures presents in co-production with NTR. A film by Noël Loozen.", clipStart: 0, clipEnd: 30, active: false },
    { name: "Story To Tell", id: "", poster: "Story To Tell.jpg", desc: "A short film inspired by Notorious B.I.G.'s 'I Got a Story to Tell'.", clipStart: 0, clipEnd: 30, active: false },
    { name: "Tell Tale Signs", id: "", poster: "Tell Tale Signs.jpg", desc: "A short coming-of-age film by Ginevra Gentili. Award winner.", clipStart: 0, clipEnd: 30, active: false },
    { name: "Terracotta", id: "", poster: "Terracotta.jpg", desc: "Musicbox Club Docs exploring clubs, culture, and location.", clipStart: 0, clipEnd: 30, active: false },
    { name: "The Alchemy of Spirit", id: "", poster: "THE ALCHEMY OF SPIRIT.jpg", desc: "A film directed by Droid ID exploring inner transformation by the water.", clipStart: 0, clipEnd: 30, active: false },
    { name: "Waysland", id: "", poster: "WAYSLAND.jpg", desc: "A Hop Top Productions film directed by Lyria Garcia.", clipStart: 0, clipEnd: 30, active: false },
    { name: "Wing It!", id: "", poster: "WING IT!.jpg", desc: "A Pet Project featuring pet-powered engineering and blueprint animation.", clipStart: 0, clipEnd: 30, active: false }
  ];

  let currentSelectedMovie = vodLibrary[0];

  function renderCatalog() {
    const grid = document.getElementById('poster-grid');
    grid.innerHTML = "";

    vodLibrary.forEach((movie) => {
      let card = document.createElement('div');
      card.className = 'poster-card';
      card.onclick = () => selectMovieForPreview(movie);

      card.innerHTML = `
        <div class="poster-img-wrap">
          <img src="${movie.poster}" alt="${movie.name}" loading="lazy">
        </div>
        <div class="poster-title-bar">${movie.name}</div>
      `;
      grid.appendChild(card);
    });
  }

  function selectMovieForPreview(movie) {
    currentSelectedMovie = movie;
    document.getElementById('hero-title').innerText = movie.name;
    document.getElementById('hero-desc').innerText = movie.desc;

    const heroIframe = document.getElementById('hero-iframe');
    let previewId = movie.isSeries ? movie.episodes[0].id : movie.id;

    if (movie.active && previewId) {
      heroIframe.src = `https://www.dailymotion.com/embed/video/${previewId}?autoplay=1&mute=1&controls=0&start=${movie.clipStart}&end=${movie.clipEnd}&loop=1&queue-enable=0&sharing-enable=0&related-video=0`;
      heroIframe.style.display = "block";
    } else {
      heroIframe.src = "";
      heroIframe.style.display = "none";
    }
  }

  function launchFullFeature() {
    if (!currentSelectedMovie.active || (!currentSelectedMovie.id && !currentSelectedMovie.isSeries)) {
      alert("This title's full feature link is coming soon!");
      return;
    }

    const modal = document.getElementById('full-player-modal');
    const modalTitle = document.getElementById('full-player-title');
    const modalIframe = document.getElementById('full-player-iframe');
    const selector = document.getElementById('episode-selector');
    const episodeList = document.getElementById('episode-list');

    modalTitle.innerText = "Now Playing: " + currentSelectedMovie.name;

    if (currentSelectedMovie.isSeries) {
      modalIframe.style.display = "none";
      selector.style.display = "block";
      episodeList.innerHTML = "";

      currentSelectedMovie.episodes.forEach(ep => {
        let btn = document.createElement('button');
        btn.className = 'ep-btn';
        btn.innerText = ep.title;
        btn.onclick = () => {
          selector.style.display = "none";
          modalIframe.style.display = "block";
          modalIframe.src = `https://www.dailymotion.com/embed/video/${ep.id}?autoplay=1&mute=0&controls=1&queue-enable=0&sharing-enable=0&related-video=0`;
        };
        episodeList.appendChild(btn);
      });
    } else {
      selector.style.display = "none";
      modalIframe.style.display = "block";
      modalIframe.src = `https://www.dailymotion.com/embed/video/${currentSelectedMovie.id}?autoplay=1&mute=0&controls=1&queue-enable=0&sharing-enable=0&related-video=0`;
    }
    
    modal.style.display = 'flex';
  }

  function closeFullFeature() {
    const modal = document.getElementById('full-player-modal');
    const modalIframe = document.getElementById('full-player-iframe');
    
    modalIframe.src = "";
    modal.style.display = 'none';
  }

  function toggleHeroInfo() {
    alert(currentSelectedMovie.name + "\n\n" + currentSelectedMovie.desc);
  }

  renderCatalog();
  selectMovieForPreview(vodLibrary[0]);
</script>
</body>
</html>
