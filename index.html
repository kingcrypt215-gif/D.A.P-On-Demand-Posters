<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>D.A.P On-Demand</title>
  <style>
    body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow-x: hidden; }
    #brand { text-align: center; color: #FFD700; font-size: clamp(18px, 4vw, 24px); font-weight: bold; padding: 10px; letter-spacing: 1px; }
    
    /* Netflix Style Billboard / Hero Preview Area */
    #hero-container {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #0a0a0a;
      overflow: hidden;
      border-bottom: 3px solid #FFD700;
    }

    #hero-iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
      pointer-events: none;
    }

    .hero-vignette {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(0deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.6) 100%);
      z-index: 2;
      pointer-events: none;
    }

    #hero-content {
      position: absolute;
      bottom: 25px;
      left: 25px;
      z-index: 3;
      max-width: 600px;
    }

    #hero-title {
      color: #FFD700;
      font-size: clamp(20px, 4vw, 36px);
      font-weight: bold;
      margin: 0 0 10px 0;
      text-shadow: 2px 2px 6px #000;
    }

    #hero-desc {
      color: #ddd;
      font-size: clamp(12px, 2vw, 15px);
      margin: 0 0 15px 0;
      text-shadow: 1px 1px 4px #000;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .hero-btn-group {
      display: flex;
      gap: 10px;
    }

    .netflix-btn-play {
      background: #FFD700;
      color: #000;
      border: none;
      padding: 10px 22px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      font-size: clamp(12px, 2vw, 15px);
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    .netflix-btn-play:hover { background: #fff; }

    .netflix-btn-info {
      background: rgba(109, 109, 110, 0.7);
      color: #fff;
      border: none;
      padding: 10px 22px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      font-size: clamp(12px, 2vw, 15px);
      backdrop-filter: blur(4px);
    }
    .netflix-btn-info:hover { background: rgba(109, 109, 110, 0.9); }

    /* Netflix Style Horizontal Rows Section */
    #vod-catalog-section {
      padding: 20px 15px;
      background: #000;
    }

    .category-section {
      margin-bottom: 25px;
    }

    .section-heading {
      color: #FFD700;
      font-size: clamp(16px, 3vw, 20px);
      font-weight: bold;
      margin-bottom: 12px;
    }

    .poster-row {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 10px;
      scroll-behavior: smooth;
      scrollbar-width: thin;
      scrollbar-color: #FFD700 #141414;
    }

    .poster-row::-webkit-scrollbar {
      height: 6px;
    }
    .poster-row::-webkit-scrollbar-thumb {
      background: #FFD700;
      border-radius: 3px;
    }

    .poster-card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.25s ease, border-color 0.25s ease;
      display: flex;
      flex-direction: column;
      flex: 0 0 130px;
      min-width: 130px;
    }

    .poster-card:hover {
      transform: scale(1.05);
      border-color: #FFD700;
      z-index: 10;
    }

    .poster-img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 2/3;
      background: #111;
    }

    .poster-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .poster-title-bar {
      padding: 8px;
      font-size: 12px;
      font-weight: bold;
      color: #fff;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      background: #141414;
    }

    /* Details / Pre-Play Modal */
    #details-modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85);
      z-index: 99998;
      display: none;
      justify-content: center;
      align-items: center;
      padding: 15px;
      box-sizing: border-box;
      backdrop-filter: blur(5px);
      animation: fadeIn 0.2s ease-in-out;
    }

    .details-content-box {
      background: #181818;
      border: 2px solid #FFD700;
      border-radius: 8px;
      max-width: 500px;
      width: 100%;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
    }

    .details-poster-banner {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      background: #111;
    }

    .details-text-area {
      padding: 20px;
    }

    #details-modal-title {
      color: #FFD700;
      font-size: 22px;
      font-weight: bold;
      margin: 0 0 10px 0;
    }

    #details-modal-desc {
      color: #ccc;
      font-size: 14px;
      line-height: 1.5;
      margin: 0 0 20px 0;
    }

    .details-btn-row {
      display: flex;
      gap: 12px;
    }

    .watch-now-btn {
      background: #FFD700;
      color: #000;
      border: none;
      padding: 12px 24px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      font-size: 15px;
      flex-grow: 1;
      text-align: center;
      transition: background 0.2s;
    }
    .watch-now-btn:hover { background: #fff; }

    .close-details-btn {
      background: #333;
      color: #fff;
      border: 1px solid #555;
      padding: 12px 18px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
    }
    .close-details-btn:hover { background: #444; }

    /* Episode Selector inside Details Modal for Series */
    #details-episode-container {
      margin-top: 10px;
      display: none;
    }

    #details-episode-container h4 {
      color: #FFD700;
      margin: 0 0 8px 0;
      font-size: 14px;
    }

    .details-ep-btn {
      display: block;
      width: 100%;
      background: #252525;
      color: #fff;
      border: 1px solid #444;
      padding: 10px;
      margin: 6px 0;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      text-align: left;
    }
    .details-ep-btn:hover {
      background: #FFD700;
      color: #000;
      border-color: #FFD700;
    }

    /* Custom D.A.P On-Demand Player Shell Modal */
    #full-player-modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #000;
      z-index: 999999;
      display: none;
      flex-direction: column;
      animation: fadeIn 0.25s ease-in-out;
    }

    #full-player-header {
      background: linear-gradient(180deg, #111 0%, #080808 100%);
      height: 60px;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 3px solid #FFD700;
      box-shadow: 0 4px 20px rgba(0,0,0,0.8);
      z-index: 10;
      box-sizing: border-box;
    }

    .dap-player-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .dap-live-dot {
      width: 12px;
      height: 12px;
      background: #FFD700;
      border-radius: 50%;
      box-shadow: 0 0 10px #FFD700;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.6; transform: scale(0.95); }
      50% { opacity: 1; transform: scale(1.05); }
      100% { opacity: 0.6; transform: scale(0.95); }
    }

    #full-player-title {
      color: #FFD700;
      font-weight: bold;
      font-size: clamp(14px, 3vw, 18px);
      letter-spacing: 1px;
      text-transform: uppercase;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    .close-modal-btn {
      background: #FFD700;
      color: #000;
      border: none;
      padding: 8px 16px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      letter-spacing: 0.5px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      transition: background 0.2s, transform 0.1s;
    }
    .close-modal-btn:hover { background: #fff; transform: scale(1.02); }

    #full-player-body {
      position: relative;
      width: 100%;
      height: calc(100vh - 60px);
      background: #000;
      overflow: hidden;
    }

    #full-player-iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #000;
      pointer-events: auto;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>

<div id="brand">D.A.P ON-DEMAND</div>

<!-- Netflix Style Hero Billboard Preview Player -->
<div id="hero-container">
  <div class="hero-vignette"></div>
  <iframe id="hero-iframe" frameborder="0" allow="autoplay; encrypted-media"></iframe>
  <div id="hero-content">
    <h1 id="hero-title">Select a Movie</h1>
    <p id="hero-desc">Click any movie poster below to preview a teaser clip right here, or click Play to watch the full feature.</p>
    <div class="hero-btn-group">
      <button class="netflix-btn-play" onclick="handlePlayButton()">▶ Play Movie</button>
      <button class="netflix-btn-info" onclick="toggleHeroInfo()">ⓘ Overview</button>
    </div>
  </div>
</div>

<!-- On-Demand Horizontal Category Rows Section -->
<div id="vod-catalog-section">
  <div id="categories-container">
    <!-- Populated dynamically via JS -->
  </div>
</div>

<!-- Details / Pre-Play Modal -->
<div id="details-modal">
  <div class="details-content-box">
    <img id="details-modal-img" class="details-poster-banner" src="" alt="Poster">
    <div class="details-text-area">
      <h3 id="details-modal-title">Title</h3>
      <p id="details-modal-desc">Description goes here...</p>
      
      <div id="details-episode-container">
        <h4>Select Episode:</h4>
        <div id="details-episode-list"></div>
      </div>

      <div class="details-btn-row" id="details-main-action-row">
        <button class="watch-now-btn" onclick="openFullFeature()">▶ Watch Now</button>
        <button class="close-details-btn" onclick="closeDetailsModal()">Close</button>
      </div>
    </div>
  </div>
</div>

<!-- Custom D.A.P On-Demand Theater Player Modal -->
<div id="full-player-modal">
  <div id="full-player-header">
    <div class="dap-player-brand">
      <div class="dap-live-dot"></div>
      <span id="full-player-title">D.A.P ON-DEMAND</span>
    </div>
    <button class="close-modal-btn" onclick="closeFullFeature()">CLOSE ✕</button>
  </div>
  <div id="full-player-body">
    <iframe id="full-player-iframe" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
  </div>
</div>

  let allMovies = [];
  categoriesData.forEach(cat => {
    cat.titles.forEach(movie => allMovies.push(movie));
  });

  let currentSelectedMovie = allMovies[0];

  function renderCategories() {
    const container = document.getElementById('categories-container');
    container.innerHTML = "";

    categoriesData.forEach(cat => {
      let sectionDiv = document.createElement('div');
      sectionDiv.className = 'category-section';

      let headingDiv = document.createElement('div');
      headingDiv.className = 'section-heading';
      headingDiv.innerText = cat.categoryName;
      sectionDiv.appendChild(headingDiv);

      let rowDiv = document.createElement('div');
      rowDiv.className = 'poster-row';

      cat.titles.forEach(movie => {
        let card = document.createElement('div');
        card.className = 'poster-card';
        card.onclick = () => openDetailsModal(movie);

        card.innerHTML = `
          <div class="poster-img-wrap">
            <img src="${movie.poster}" alt="${movie.name}" loading="lazy">
          </div>
          <div class="poster-title-bar">${movie.name}</div>
        `;
        rowDiv.appendChild(card);
      });

      sectionDiv.appendChild(rowDiv);
      container.appendChild(sectionDiv);
    });
  }

  function selectMovieForPreview(movie) {
    currentSelectedMovie = movie;
    document.getElementById('hero-title').innerText = movie.name;
    document.getElementById('hero-desc').innerText = movie.desc;

    const heroIframe = document.getElementById('hero-iframe');
    let previewId = movie.isSeries ? movie.episodes[0].id : movie.id;

    if (movie.active && previewId) {
      heroIframe.src = `https://www.dailymotion.com/embed/video/${previewId}?autoplay=1&mute=1&controls=0&start=${movie.clipStart}&end=${movie.clipEnd}&loop=1&queue-enable=0&sharing-enable=0&related-video=0`;
      heroIframe.style.display = "block";
    } else {
      heroIframe.src = "";
      heroIframe.style.display = "none";
    }
  }

  function openDetailsModal(movie) {
    currentSelectedMovie = movie;
    selectMovieForPreview(movie);

    document.getElementById('details-modal-img').src = movie.poster;
    document.getElementById('details-modal-title').innerText = movie.name;
    document.getElementById('details-modal-desc').innerText = movie.desc;

    const epContainer = document.getElementById('details-episode-container');
    const epList = document.getElementById('details-episode-list');
    const mainActionRow = document.getElementById('details-main-action-row');

    if (movie.isSeries) {
      epContainer.style.display = "block";
      mainActionRow.style.display = "none";
      epList.innerHTML = "";

      movie.episodes.forEach(ep => {
        let epBtn = document.createElement('button');
        epBtn.className = 'details-ep-btn';
        epBtn.innerText = `▶ Play ${ep.title}`;
        epBtn.onclick = () => {
          closeDetailsModal();
          playVideoId(ep.id, movie.name + " - " + ep.title);
        };
        epList.appendChild(epBtn);
      });
    } else {
      epContainer.style.display = "none";
      mainActionRow.style.display = "flex";
    }

    document.getElementById('details-modal').style.display = 'flex';
  }

  function closeDetailsModal() {
    document.getElementById('details-modal').style.display = 'none';
  }

  function handlePlayButton() {
    openDetailsModal(currentSelectedMovie);
  }

  function openFullFeature() {
    closeDetailsModal();

    if (!currentSelectedMovie.active || !currentSelectedMovie.id) {
      alert("This title's full feature link is coming soon!");
      return;
    }

    playVideoId(currentSelectedMovie.id, currentSelectedMovie.name);
  }

  function playVideoId(videoId, titleText) {
    const modal = document.getElementById('full-player-modal');
    const modalTitle = document.getElementById('full-player-title');
    const modalIframe = document.getElementById('full-player-iframe');

    modalTitle.innerText = "D.A.P ON-DEMAND: " + titleText;
    modalIframe.src = `https://www.dailymotion.com/embed/video/${videoId}?autoplay=1&mute=0&controls=1&queue-enable=0&sharing-enable=0&related-video=0`;
    modal.style.display = 'flex';
  }

  function closeFullFeature() {
    const modal = document.getElementById('full-player-modal');
    const modalIframe = document.getElementById('full-player-iframe');
    
    modalIframe.src = "";
    modal.style.display = 'none';
  }

  function toggleHeroInfo() {
    openDetailsModal(currentSelectedMovie);
  }

  renderCategories();
  selectMovieForPreview(allMovies[0]);
</script>
</body>
</html>
